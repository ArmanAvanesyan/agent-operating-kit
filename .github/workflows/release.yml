name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build release artifacts
        run: ./scripts/release/build.sh dist/release
      - name: Validate kit
        run: |
          ./scripts/validate.sh
          ./scripts/aok validate
          ./scripts/aok codex local-env validate templates --json > dist/release/codex-local-environment.json
          ./scripts/aok codex local-env actions templates
          python3 -m py_compile scripts/aok
          python3 -m py_compile scripts/release/build.py
          ./scripts/aok doctor --json > dist/release/doctor.json || true
          python3 -m json.tool dist/release/index.json >/dev/null
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-operating-kit-release
          path: dist/release/**
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**
